name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (index.html, llms.txt, robots.txt, sitemap.xml + assets)
        run: |
          mkdir -p _site/assets
          cp -R site/. _site/
          cp assets/inox-*.png _site/assets/
          # site/index.html references ../assets/; flatten to assets/ for the published root
          sed -i 's#\.\./assets/#assets/#g' _site/index.html
          # demo gif (if present) referenced from README/site
          [ -f assets/inox-demo.gif ] && cp assets/inox-demo.gif _site/assets/ || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
